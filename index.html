<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Unblocked Web Browser</title>
  <style>
    body { width: 100vw; height: 100vh; font-family: sans-serif; margin: 0; padding: 10px; box-sizing: border-box; background: #f5f5f5; }
    #nav { display: flex; gap: 5px; margin-bottom: 10px; }
    input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { padding: 8px 16px; background: #007acc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #005999; }
    iframe { width: 100%; height: calc(100vh - 65px); border: 1px solid #ccc; border-radius: 4px; background: white; }
  </style>
</head>
<body>

  <div id="nav">
    <input type="text" id="url" value="wikipedia.org" placeholder="Enter URL or search term...">
    <button id="go">Go</button>
  </div>
  
  <iframe id="view"></iframe>

  <script>
    document.getElementById('go').onclick = function() {
    let query = document.getElementById('url').value.trim();
    if (!query) return;

    // 1. Format the URL correctly
    let targetUrl = query;
    if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
      if (targetUrl.includes('.') && !targetUrl.includes(' ')) {
        targetUrl = 'https://' + targetUrl;
      } else {
        targetUrl = 'https://google.com' + encodeURIComponent(targetUrl);
      }
    }

    let iframe = document.getElementById('view');

    // 2. FIRST TRY: Attempt to load the site completely normally (Fixes Wikipedia, etc.)
    iframe.srcdoc = ""; // Clear any previous error text
    iframe.removeAttribute('srcdoc'); 
    iframe.src = targetUrl;

    // 3. SECOND TRY: Catch if the site goes blank or refuses to load
    // If the site blocks iframes, we swap to a hidden CORS proxy worker
    iframe.onerror = function() {
      loadWithProxy(targetUrl, iframe);
    };
  };

  function loadWithProxy(targetUrl, iframe) {
    // Utilizing a secondary developer proxy network tier (corsproxy.io)
    let backupProxy = 'https://corsproxy.io?' + encodeURIComponent(targetUrl);

    fetch(backupProxy)
      .then(res => {
        if (!res.ok) throw new Error();
        return res.text();
      })
      .then(html => {
        let baseUri = new URL(targetUrl).origin + '/';
        let baseTag = `<base href="${baseUri}">`;
        iframe.srcdoc = html.includes('<head>') ? html.replace('<head>', '<head>' + baseTag) : baseTag + html;
      })
      .catch(() => {
        iframe.srcdoc = `<div style="padding:20px;font-family:sans-serif;color:#333;">
          <h3>Connection Interrupted</h3>
          <p>This site requires a private proxy deployment to load on this network.</p>
        </div>`;
      });
  }

  // Allow Enter key to submit
  document.getElementById('url').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') document.getElementById('go').click();
  });

  </script>
</body>
</html>
