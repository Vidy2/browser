<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Unblocked Web Browser</title>
  <style>
    body { width: 400px; height: 450px; font-family: sans-serif; margin: 10px; }
    #nav { display: flex; gap: 5px; margin-bottom: 10px; }
    input { flex: 1; padding: 5px; }
    iframe { width: 100%; height: 380px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <div id="nav">
    <input type="text" id="url" value="https://bing.com">
    <button id="go">Go</button>
  </div>
  <iframe id="view" src="https://bing.com"></iframe>
  <script>
    document.getElementById('go').onclick = function() {
      let url = document.getElementById('url').value;
      if (!url.startsWith('http')) url = 'https://' + url;
      document.getElementById('view').src = url;
    };
  </script>
</body>
</html>
